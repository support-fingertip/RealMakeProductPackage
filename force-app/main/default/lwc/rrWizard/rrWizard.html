<template>
    <!-- Loading Spinner -->
    <template if:true={isLoading}>
        <lightning-spinner alternative-text="Saving..." size="large"></lightning-spinner>
    </template>

    <!-- Page Header -->
    <div class="slds-page-header slds-m-bottom_medium">
        <div class="slds-page-header__row">
            <div class="slds-page-header__col-title">
                <div class="slds-media">
                    <div class="slds-media__figure">
                        <lightning-icon icon-name="standard:queue" size="medium"></lightning-icon>
                    </div>
                    <div class="slds-media__body">
                        <h1 class="slds-page-header__title">Round Robin Configuration</h1>
                        <p class="slds-page-header__name-meta">Dynamic Field-Based Assignment</p>
                    </div>
                </div>
            </div>
            <div class="slds-page-header__col-actions">
                <lightning-button label="Cancel" onclick={handleCancel} class="slds-m-right_x-small"></lightning-button>
            </div>
        </div>
    </div>

    <!-- Progress Indicator -->
    <div class="slds-m-horizontal_medium slds-m-bottom_medium">
        <lightning-progress-indicator current-step={currentStep} type="base" variant="base">
            <lightning-progress-step label="Select Fields" value="1" data-step="1" onclick={handleStepClick}></lightning-progress-step>
            <lightning-progress-step label="Set Values" value="2" data-step="2" onclick={handleStepClick}></lightning-progress-step>
            <lightning-progress-step label="Add Members" value="3" data-step="3" onclick={handleStepClick}></lightning-progress-step>
            <lightning-progress-step label="Review & Save" value="4" data-step="4" onclick={handleStepClick}></lightning-progress-step>
        </lightning-progress-indicator>
    </div>

    <!-- STEP 1: Basic Info + Select Lead Fields -->
    <template if:true={isStep1}>
        <div class="slds-m-around_medium">
            <lightning-card title="Step 1: Basic Info & Select Lead Fields" icon-name="utility:settings">
                <div class="slds-p-around_medium">
                    <lightning-input
                        label="Rule Name"
                        value={rrData.Name}
                        onchange={handleNameChange}
                        required
                        placeholder="Enter a descriptive name for this round robin"
                        class="slds-m-bottom_medium">
                    </lightning-input>

                    <lightning-input
                        type="checkbox"
                        label="Active"
                        checked={rrData.Is_Active__c}
                        onchange={handleActiveChange}
                        class="slds-m-bottom_large">
                    </lightning-input>

                    <div class="slds-m-top_medium">
                        <h3 class="slds-text-heading_small slds-m-bottom_small">Select Lead Fields for Matching</h3>
                        <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_small">
                            Choose which Lead fields should be used to match incoming leads to this round robin rule.
                            Lookup fields will show a searchable dropdown. Priority weights are auto-populated from the Field Priority Setup.
                        </p>
                        <lightning-dual-listbox
                            label="Lead Fields"
                            source-label="Available Fields"
                            selected-label="Selected Fields"
                            options={leadFieldOptions}
                            value={selectedFieldApiNames}
                            onchange={handleFieldSelection}
                            min="1"
                            size="8">
                        </lightning-dual-listbox>
                    </div>

                    <template if:true={hasFilters}>
                        <div class="slds-m-top_medium slds-box slds-box_x-small slds-theme_shade">
                            <p class="slds-text-title_caps slds-m-bottom_x-small">Selected Fields</p>
                            <template for:each={sortedFilters} for:item="filter">
                                <lightning-badge key={filter.id} label={filter.fieldLabel} class="slds-m-right_xx-small slds-m-bottom_xx-small"></lightning-badge>
                            </template>
                        </div>
                    </template>
                </div>
            </lightning-card>
        </div>
    </template>

    <!-- STEP 2: Preference Order + Field Values -->
    <template if:true={isStep2}>
        <div class="slds-m-around_medium">
            <lightning-card title="Step 2: Set Preference & Values" icon-name="utility:sort">
                <div class="slds-p-around_medium">
                    <p class="slds-text-body_regular slds-m-bottom_small slds-text-color_weak">
                        Set the preference order (priority) and matching value for each selected field.
                        Use arrows to reorder priority. Higher priority fields are evaluated first.
                    </p>

                    <!-- Total Priority Weight Bar -->
                    <div class="slds-box slds-box_x-small slds-theme_shade slds-m-bottom_medium">
                        <div class="slds-grid slds-grid_align-spread">
                            <div>
                                <span class="slds-text-title_caps">Filters:</span>
                                <strong class="slds-m-left_xx-small">{filters.length}</strong>
                            </div>
                            <div>
                                <span class="slds-text-title_caps">Total Priority Weight:</span>
                                <strong class="slds-m-left_xx-small">{totalPriorityWeight}</strong>
                            </div>
                        </div>
                    </div>

                    <template if:true={hasFilters}>
                        <div class="filter-list">
                            <template for:each={sortedFilters} for:item="filter" for:index="index">
                                <div key={filter.id} class="slds-box slds-m-bottom_small filter-row">
                                    <div class="slds-grid slds-grid_vertical-align-center slds-gutters">
                                        <!-- Priority Badge -->
                                        <div class="slds-col slds-size_1-of-12 slds-text-align_center">
                                            <lightning-badge label={filter.preferenceOrder} class="priority-badge"></lightning-badge>
                                        </div>

                                        <!-- Field Label + Priority Weight -->
                                        <div class="slds-col slds-size_3-of-12">
                                            <p class="slds-text-title_caps slds-text-color_weak">Field</p>
                                            <p class="slds-text-body_regular"><strong>{filter.fieldLabel}</strong></p>
                                            <p class="slds-text-body_small slds-text-color_weak">{filter.fieldApiName}</p>
                                            <template if:true={filter.fieldPriority}>
                                                <lightning-badge label={filter.fieldPriority} class="slds-m-top_xx-small slds-badge_inverse priority-weight-badge"></lightning-badge>
                                                <span class="slds-text-body_small slds-text-color_weak slds-m-left_xx-small">weight</span>
                                            </template>
                                        </div>

                                        <!-- Value Input -->
                                        <div class="slds-col slds-size_5-of-12">
                                            <!-- Picklist -->
                                            <template if:true={filter.isPicklist}>
                                                <lightning-combobox
                                                    label="Value"
                                                    value={filter.value}
                                                    options={filter.picklistOptions}
                                                    placeholder="Select a value"
                                                    data-filter-id={filter.id}
                                                    onchange={handleFilterValueChange}
                                                    required>
                                                </lightning-combobox>
                                            </template>

                                            <!-- Lookup / Reference -->
                                            <template if:true={filter.isReference}>
                                                <template if:true={filter.selectedLookupName}>
                                                    <!-- Selected lookup pill -->
                                                    <div class="slds-form-element">
                                                        <label class="slds-form-element__label">Value</label>
                                                        <div class="slds-form-element__control">
                                                            <lightning-pill
                                                                label={filter.selectedLookupName}
                                                                data-filter-id={filter.id}
                                                                onremove={handleClearLookup}>
                                                                <lightning-icon icon-name="standard:record" size="x-small"></lightning-icon>
                                                            </lightning-pill>
                                                        </div>
                                                    </div>
                                                </template>
                                                <template if:false={filter.selectedLookupName}>
                                                    <!-- Search input -->
                                                    <div class="slds-form-element lookup-container">
                                                        <label class="slds-form-element__label">
                                                            Search {filter.referenceObjectName}
                                                        </label>
                                                        <div class="slds-form-element__control slds-input-has-icon slds-input-has-icon_left">
                                                            <lightning-icon icon-name="utility:search" size="x-small" class="slds-input__icon slds-input__icon_left lookup-search-icon"></lightning-icon>
                                                            <lightning-input
                                                                variant="label-hidden"
                                                                label="Search"
                                                                value={filter.lookupSearchTerm}
                                                                placeholder="Type to search..."
                                                                data-filter-id={filter.id}
                                                                onchange={handleLookupSearch}
                                                                autocomplete="off">
                                                            </lightning-input>
                                                        </div>
                                                        <!-- Dropdown results -->
                                                        <template if:true={filter.showLookupDropdown}>
                                                            <div class="slds-dropdown slds-dropdown_length-5 slds-dropdown_fluid lookup-dropdown" role="listbox">
                                                                <ul class="slds-listbox slds-listbox_vertical" role="presentation">
                                                                    <template for:each={filter.lookupResults} for:item="result">
                                                                        <li key={result.id} role="presentation" class="slds-listbox__item">
                                                                            <div class="slds-media slds-listbox__option slds-listbox__option_entity slds-listbox__option_has-meta"
                                                                                 role="option"
                                                                                 data-filter-id={filter.id}
                                                                                 data-record-id={result.id}
                                                                                 data-record-name={result.name}
                                                                                 onclick={handleLookupSelect}>
                                                                                <span class="slds-media__figure slds-listbox__option-icon">
                                                                                    <lightning-icon icon-name="standard:record" size="small"></lightning-icon>
                                                                                </span>
                                                                                <span class="slds-media__body">
                                                                                    <span class="slds-listbox__option-text slds-listbox__option-text_entity">{result.name}</span>
                                                                                </span>
                                                                            </div>
                                                                        </li>
                                                                    </template>
                                                                </ul>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                            </template>

                                            <!-- Text input (non-picklist, non-reference) -->
                                            <template if:true={filter.isText}>
                                                <lightning-input
                                                    label="Value"
                                                    value={filter.value}
                                                    placeholder="Enter match value"
                                                    data-filter-id={filter.id}
                                                    onchange={handleFilterValueChange}
                                                    required>
                                                </lightning-input>
                                            </template>
                                        </div>

                                        <!-- Reorder / Remove Buttons -->
                                        <div class="slds-col slds-size_3-of-12 slds-text-align_right">
                                            <lightning-button-icon
                                                icon-name="utility:arrowup"
                                                variant="border"
                                                alternative-text="Move Up"
                                                data-filter-id={filter.id}
                                                onclick={handleMoveUp}
                                                class="slds-m-right_xx-small">
                                            </lightning-button-icon>
                                            <lightning-button-icon
                                                icon-name="utility:arrowdown"
                                                variant="border"
                                                alternative-text="Move Down"
                                                data-filter-id={filter.id}
                                                onclick={handleMoveDown}
                                                class="slds-m-right_xx-small">
                                            </lightning-button-icon>
                                            <lightning-button-icon
                                                icon-name="utility:delete"
                                                variant="border-destructive"
                                                alternative-text="Remove"
                                                data-filter-id={filter.id}
                                                onclick={handleRemoveFilter}>
                                            </lightning-button-icon>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>

                    <template if:false={hasFilters}>
                        <div class="slds-text-align_center slds-p-around_large">
                            <lightning-icon icon-name="utility:filterList" size="large" class="slds-m-bottom_small"></lightning-icon>
                            <p>No fields selected. Go back to Step 1 to select Lead fields.</p>
                        </div>
                    </template>
                </div>
            </lightning-card>
        </div>
    </template>

    <!-- STEP 3: Team Members -->
    <template if:true={isStep3}>
        <div class="slds-m-around_medium">
            <lightning-card title="Step 3: Assign Team Members" icon-name="standard:group">
                <div class="slds-p-around_medium">
                    <p class="slds-text-body_regular slds-m-bottom_medium slds-text-color_weak">
                        Select users for each assignment type. Users will be rotated in round-robin order.
                    </p>
                    <lightning-tabset variant="scoped">
                        <template for:each={assignmentTabs} for:item="tab">
                            <lightning-tab key={tab.value} label={tab.label} icon-name="standard:user">
                                <div class="slds-p-around_small">
                                    <div class="slds-box slds-box_x-small slds-theme_shade slds-m-bottom_small">
                                        <p>Select users who will receive <strong>{tab.label}</strong> leads via rotation.</p>
                                    </div>
                                    <lightning-dual-listbox
                                        name={tab.value}
                                        label="Team Members"
                                        source-label="Available Users"
                                        selected-label="Assigned Users"
                                        options={userOptions}
                                        value={tab.selectedUsers}
                                        onchange={handleUserChange}
                                        size="6">
                                    </lightning-dual-listbox>
                                </div>
                            </lightning-tab>
                        </template>
                    </lightning-tabset>
                </div>
            </lightning-card>
        </div>
    </template>

    <!-- STEP 4: Review & Save -->
    <template if:true={isStep4}>
        <div class="slds-m-around_medium">
            <lightning-card title="Step 4: Review & Save" icon-name="utility:preview">
                <div class="slds-p-around_medium">

                    <!-- Basic Info -->
                    <div class="slds-section slds-is-open slds-m-bottom_medium">
                        <h3 class="slds-text-heading_small slds-m-bottom_small">Basic Information</h3>
                        <div class="slds-box slds-box_x-small slds-theme_shade">
                            <div class="slds-grid slds-wrap">
                                <div class="slds-col slds-size_1-of-2 slds-p-around_x-small">
                                    <p class="slds-text-title_caps slds-text-color_weak">Rule Name</p>
                                    <p class="slds-text-body_regular"><strong>{rrData.Name}</strong></p>
                                </div>
                                <div class="slds-col slds-size_1-of-2 slds-p-around_x-small">
                                    <p class="slds-text-title_caps slds-text-color_weak">Active</p>
                                    <p class="slds-text-body_regular">
                                        <template if:true={rrData.Is_Active__c}>Yes</template>
                                        <template if:false={rrData.Is_Active__c}>No</template>
                                    </p>
                                </div>
                            </div>
                            <div class="slds-grid slds-wrap slds-m-top_x-small">
                                <div class="slds-col slds-size_1-of-2 slds-p-around_x-small">
                                    <p class="slds-text-title_caps slds-text-color_weak">Total Priority Weight</p>
                                    <p class="slds-text-body_regular"><strong>{totalPriorityWeight}</strong></p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Filter Criteria -->
                    <div class="slds-section slds-is-open slds-m-bottom_medium">
                        <h3 class="slds-text-heading_small slds-m-bottom_small">Filter Criteria</h3>
                        <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-table_striped">
                            <thead>
                                <tr class="slds-line-height_reset">
                                    <th scope="col" style="width: 4rem;"><div class="slds-truncate">Order</div></th>
                                    <th scope="col"><div class="slds-truncate">Field</div></th>
                                    <th scope="col"><div class="slds-truncate">API Name</div></th>
                                    <th scope="col"><div class="slds-truncate">Type</div></th>
                                    <th scope="col"><div class="slds-truncate">Value</div></th>
                                    <th scope="col" style="width: 6rem;"><div class="slds-truncate">Weight</div></th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={summaryFilters} for:item="filter">
                                    <tr key={filter.id}>
                                        <td><lightning-badge label={filter.preferenceOrder}></lightning-badge></td>
                                        <td><strong>{filter.fieldLabel}</strong></td>
                                        <td class="slds-text-color_weak">{filter.fieldApiName}</td>
                                        <td>{filter.fieldType}</td>
                                        <td>{filter.displayValue}</td>
                                        <td><lightning-badge label={filter.priorityDisplay}></lightning-badge></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>

                    <!-- Team Distribution -->
                    <div class="slds-section slds-is-open">
                        <h3 class="slds-text-heading_small slds-m-bottom_small">Team Distribution</h3>
                        <template if:true={hasTeams}>
                            <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-table_striped">
                                <thead>
                                    <tr class="slds-line-height_reset">
                                        <th scope="col"><div class="slds-truncate">Assignment Type</div></th>
                                        <th scope="col"><div class="slds-truncate">Members</div></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template for:each={summaryTeams} for:item="team">
                                        <tr key={team.role}>
                                            <td><strong>{team.role}</strong></td>
                                            <td><lightning-badge label={team.count}></lightning-badge> users</td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </template>
                        <template if:false={hasTeams}>
                            <div class="slds-text-align_center slds-p-around_medium slds-theme_shade">
                                <p class="slds-text-color_weak">No team members assigned.</p>
                            </div>
                        </template>
                    </div>
                </div>
            </lightning-card>
        </div>
    </template>

    <!-- Footer Navigation -->
    <div class="wizard-footer slds-m-top_medium slds-p-around_medium slds-grid slds-grid_align-spread">
        <template if:false={isFirstStep}>
            <lightning-button
                label="Back"
                onclick={goBack}
                icon-name="utility:back">
            </lightning-button>
        </template>
        <template if:true={isFirstStep}>
            <div></div>
        </template>
        <lightning-button
            label={nextLabel}
            variant="brand"
            onclick={goNext}
            icon-position="right">
        </lightning-button>
    </div>
</template>
