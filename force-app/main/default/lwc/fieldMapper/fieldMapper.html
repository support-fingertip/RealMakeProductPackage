<template>
    <!-- ==================== LIST VIEW ==================== -->
    <template if:false={showForm}>
        <div class="section-header slds-p-around_medium">
            <h2 class="slds-text-heading_medium">
                <lightning-icon icon-name="utility:connected_apps" size="small" class="slds-m-right_x-small"></lightning-icon>
                Field Mapping Configurations
            </h2>
            <div class="header-actions">
                <lightning-button-icon icon-name="utility:refresh" alternative-text="Refresh"
                    onclick={handleRefreshList} variant="border-filled" class="slds-m-right_x-small"></lightning-button-icon>
                <lightning-button label="New Configuration" variant="brand"
                    icon-name="utility:add" onclick={handleNewConfig}></lightning-button>
            </div>
        </div>

        <template if:true={isLoadingList}>
            <div class="loading-container">
                <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
            </div>
        </template>

        <template if:false={isLoadingList}>
            <template if:true={hasConfigurations}>
                <div class="slds-p-horizontal_medium">
                    <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-table_striped compact-table">
                        <thead>
                            <tr>
                                <th scope="col">Name</th>
                                <th scope="col">From Object</th>
                                <th scope="col">To Object</th>
                                <th scope="col">Trigger</th>
                                <th scope="col">Fields</th>
                                <th scope="col">Status</th>
                                <th scope="col" class="action-col">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={mappingConfigurations} for:item="cfg">
                                <tr key={cfg.id}>
                                    <td><strong>{cfg.name}</strong></td>
                                    <td>{cfg.fromObject}</td>
                                    <td>{cfg.toObject}</td>
                                    <td>{cfg.mappingTrigger}</td>
                                    <td>{cfg.fieldCount}</td>
                                    <td>
                                        <template if:true={cfg.isActive}>
                                            <span class="slds-badge slds-theme_success">Active</span>
                                        </template>
                                        <template if:false={cfg.isActive}>
                                            <span class="slds-badge">Inactive</span>
                                        </template>
                                    </td>
                                    <td class="action-col">
                                        <lightning-button-icon icon-name="utility:delete"
                                            alternative-text="Delete" data-id={cfg.id}
                                            onclick={handleDeleteConfig} variant="bare"
                                            size="small"></lightning-button-icon>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>

            <template if:false={hasConfigurations}>
                <div class="slds-p-around_large slds-text-align_center">
                    <lightning-icon icon-name="utility:connected_apps" size="large" class="slds-m-bottom_small"></lightning-icon>
                    <h3 class="slds-text-heading_small slds-m-bottom_x-small">No Mappings Configured</h3>
                    <p class="slds-text-body_regular slds-text-color_weak">Click "New Configuration" to create your first field mapping.</p>
                </div>
            </template>
        </template>
    </template>

    <!-- ==================== FORM VIEW ==================== -->
    <template if:true={showForm}>
        <div class="slds-p-around_medium">
            <div class="slds-grid slds-grid_align-spread slds-m-bottom_medium">
                <lightning-button label="Back to List" icon-name="utility:back" onclick={handleBackToList}></lightning-button>
                <h2 class="slds-text-heading_medium">New Field Mapping</h2>
                <div></div>
            </div>

            <div class="slds-card">
                <div class="slds-card__body slds-card__body_inner slds-p-around_medium">
                    <lightning-input label="Mapping Name" value={mappingName}
                        onchange={handleMappingNameChange} required></lightning-input>

                    <div class="slds-grid slds-gutters slds-m-top_medium">
                        <div class="slds-col slds-size_1-of-2">
                            <lightning-combobox name="fromObject" label="From Object" value={fromObject}
                                placeholder="Select Object" options={objectOptions}
                                onchange={handleFromObjectChange} required></lightning-combobox>
                        </div>
                        <div class="slds-col slds-size_1-of-2">
                            <lightning-combobox name="toObject" label="To Object" value={toObject}
                                placeholder="Select Object" options={objectOptions}
                                onchange={handleToObjectChange} required></lightning-combobox>
                        </div>
                    </div>

                    <div class="slds-m-top_medium">
                        <lightning-combobox name="mappingTrigger" label="Mapping Trigger"
                            value={mappingTrigger} options={mappingTriggerOptions}
                            onchange={handleMappingTriggerChange} required></lightning-combobox>
                    </div>

                    <div class="slds-m-top_medium">
                        <lightning-input type="checkbox" label="Is Active" checked={isActive}
                            onchange={handleIsActiveChange}></lightning-input>
                    </div>

                    <template if:true={showFromFields}>
                        <div class="slds-m-top_large">
                            <div class="slds-grid slds-grid_align-spread slds-m-bottom_small">
                                <h3 class="slds-text-heading_small">Field Mappings</h3>
                                <lightning-button label="Add Field Mapping" onclick={addFieldMapping}
                                    icon-name="utility:add"></lightning-button>
                            </div>

                            <template for:each={fieldMappings} for:item="mapping">
                                <div key={mapping.id} class="slds-box slds-m-bottom_small">
                                    <div class="slds-grid slds-gutters">
                                        <div class="slds-col slds-size_5-of-12">
                                            <lightning-combobox name="fromField" label="From Field"
                                                value={mapping.fromField} placeholder="Select From Field"
                                                options={fromObjectFields} data-id={mapping.id}
                                                onchange={handleFromFieldChange} required></lightning-combobox>
                                        </div>
                                        <div class="slds-col slds-size_5-of-12">
                                            <lightning-combobox name="toField" label="To Field"
                                                value={mapping.toField} placeholder="Select To Field"
                                                options={mapping.compatibleToFields} data-id={mapping.id}
                                                onchange={handleToFieldChange} required></lightning-combobox>
                                        </div>
                                        <div class="slds-col slds-size_2-of-12 slds-align-bottom">
                                            <lightning-button-icon icon-name="utility:delete"
                                                alternative-text="Remove" data-id={mapping.id}
                                                onclick={removeFieldMapping} variant="bare"></lightning-button-icon>
                                        </div>
                                    </div>
                                    <template if:true={mapping.fromFieldType}>
                                        <div class="slds-text-body_small slds-text-color_weak slds-m-top_x-small">
                                            Field Type: {mapping.fromFieldType}
                                        </div>
                                    </template>
                                </div>
                            </template>

                            <template if:false={fieldMappings.length}>
                                <div class="slds-text-align_center slds-p-vertical_medium slds-text-color_weak">
                                    No field mappings added yet. Click "Add Field Mapping" to start.
                                </div>
                            </template>
                        </div>
                    </template>

                    <div class="slds-m-top_large slds-text-align_right">
                        <lightning-button label="Cancel" onclick={handleBackToList} class="slds-m-right_small"></lightning-button>
                        <lightning-button label="Save Configuration" variant="brand" onclick={handleSave}></lightning-button>
                    </div>
                </div>
            </div>
        </div>
    </template>
</template>
