<template>
    <lightning-card title="Integration Endpoints" icon-name="utility:connected_apps">
        <div slot="actions">
            <lightning-button
                variant="brand"
                label="New Endpoint"
                icon-name="utility:add"
                onclick={handleNewEndpoint}
            ></lightning-button>
        </div>

        <div class="slds-p-horizontal_medium">
            <!-- Filters -->
            <lightning-layout multiple-rows="true" class="slds-m-bottom_small">
                <lightning-layout-item size="12" medium-device-size="4" padding="around-small">
                    <lightning-input
                        type="search"
                        label="Search Endpoints"
                        placeholder="Search by name, key, or URL..."
                        value={searchKeyword}
                        onchange={handleSearchChange}
                        variant="label-hidden"
                    ></lightning-input>
                </lightning-layout-item>
                <lightning-layout-item size="12" medium-device-size="3" padding="around-small">
                    <lightning-combobox
                        label="Category"
                        value={selectedCategory}
                        options={categoryOptions}
                        onchange={handleCategoryChange}
                        placeholder="All Categories"
                    ></lightning-combobox>
                </lightning-layout-item>
                <lightning-layout-item size="12" medium-device-size="3" padding="around-small">
                    <lightning-combobox
                        label="Status"
                        value={selectedStatus}
                        options={statusOptions}
                        onchange={handleStatusChange}
                        placeholder="All Statuses"
                    ></lightning-combobox>
                </lightning-layout-item>
                <lightning-layout-item size="12" medium-device-size="2" padding="around-small">
                    <lightning-button
                        label="Clear Filters"
                        icon-name="utility:clear"
                        onclick={handleClearFilters}
                        class="slds-m-top_large"
                    ></lightning-button>
                </lightning-layout-item>
            </lightning-layout>

            <!-- Record Count -->
            <div class="slds-m-bottom_small slds-text-body_small slds-text-color_weak">
                Showing {filteredRecordCount} of {totalRecordCount} endpoints
            </div>

            <!-- Data Table -->
            <template if:true={isLoading}>
                <div class="loading-container">
                    <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
                </div>
            </template>

            <template if:false={isLoading}>
                <template if:true={hasRecords}>
                    <lightning-datatable
                        key-field="Id"
                        data={filteredEndpoints}
                        columns={columns}
                        sorted-by={sortedBy}
                        sorted-direction={sortedDirection}
                        onsort={handleSort}
                        onrowaction={handleRowAction}
                        show-row-number-column
                        default-sort-direction="asc"
                        hide-checkbox-column
                    ></lightning-datatable>
                </template>
                <template if:false={hasRecords}>
                    <div class="slds-illustration slds-illustration_small slds-p-vertical_large slds-align_absolute-center">
                        <p class="slds-text-body_regular slds-text-color_weak">
                            No endpoints found. Click "New Endpoint" to create one.
                        </p>
                    </div>
                </template>
            </template>
        </div>
    </lightning-card>

    <!-- Endpoint Form Modal -->
    <template if:true={showEndpointForm}>
        <c-integration-endpoint-form
            record-id={selectedEndpointId}
            clone-mode={isCloneMode}
            onsave={handleEndpointSaved}
            onclose={handleFormClose}
        ></c-integration-endpoint-form>
    </template>
</template>
