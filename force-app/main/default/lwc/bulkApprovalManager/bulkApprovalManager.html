<template>
    <lightning-card title="Bulk Approval Manager" icon-name="custom:custom14">

        <!-- Header Filters -->
        <div class="slds-card__header slds-grid">
            <div class="slds-col slds-size_12-of-12">
                <div class="slds-grid slds-gutters slds-wrap">

                    <!-- Search -->
                    <div class="slds-col slds-size_12-of-12 slds-medium-size_4-of-12">
                        <lightning-input
                            type="search"
                            label="Search"
                            placeholder="Search by name or submitter"
                            value={searchTerm}
                            onchange={handleSearchChange}>
                        </lightning-input>
                    </div>

                    <!-- Type Filter -->
                    <div class="slds-col slds-size_12-of-12 slds-medium-size_4-of-12">
                        <lightning-combobox
                            label="Record Type"
                            value={selectedType}
                            placeholder="All Types"
                            options={typeOptions}
                            onchange={handleTypeChange}>
                        </lightning-combobox>
                    </div>

                    <!-- Status Filter -->
                    <div class="slds-col slds-size_12-of-12 slds-medium-size_4-of-12">
                        <lightning-combobox
                            label="Status"
                            value={selectedStatus}
                            placeholder="All Statuses"
                            options={statusOptions}
                            onchange={handleStatusChange}>
                        </lightning-combobox>
                    </div>

                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div slot="actions">
            <lightning-button-group>
                <lightning-button
                    label="Refresh"
                    icon-name="utility:refresh"
                    onclick={handleRefresh}>
                </lightning-button>

                <lightning-button
                    label="Approve"
                    variant="success"
                    icon-name="utility:check"
                    disabled={hasNoSelection}
                    onclick={handleApproveClick}>
                </lightning-button>

                <lightning-button
                    label="Reject"
                    variant="destructive"
                    icon-name="utility:close"
                    disabled={hasNoSelection}
                    onclick={handleRejectClick}>
                </lightning-button>

                <lightning-button
                    label="Delegate"
                    icon-name="utility:forward"
                    disabled={hasNoSelection}
                    onclick={handleDelegateClick}>
                </lightning-button>
            </lightning-button-group>
        </div>

        <!-- Body -->
        <div class="slds-card__body slds-card__body_inner">

            <template if:true={isLoading}>
                <div class="slds-align_absolute-center slds-m-around_medium">
                    <lightning-spinner size="medium"></lightning-spinner>
                </div>
            </template>

            <template if:false={isLoading}>

                <template if:true={hasRecords}>
                    <lightning-datatable
                        key-field="workItemId"
                        data={filteredApprovals}
                        columns={columns}
                        onrowselection={handleRowSelection}
                        show-row-number-column>
                    </lightning-datatable>

                    <div class="slds-p-top_small slds-text-body_small slds-text-color_weak">
                        Showing {filteredCount} of {totalRecords} record(s)
                    </div>
                </template>

                <template if:false={hasRecords}>
                    <div class="slds-text-align_center slds-p-around_large">
                        <lightning-icon
                            icon-name="utility:approval"
                            size="large">
                        </lightning-icon>

                        <h3 class="slds-text-heading_medium slds-p-top_medium">
                            No Pending Approvals
                        </h3>

                        <p class="slds-text-body_regular slds-p-top_small">
                            You don't have any pending approval requests.
                        </p>
                    </div>
                </template>

            </template>

        </div>
    </lightning-card>
</template>
