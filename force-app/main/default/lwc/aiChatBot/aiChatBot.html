<template>
    <!-- Floating Chat Button -->
    <div class={chatBtnClass} onclick={toggleChat} title="AI Assistant">
        <template lwc:if={isChatOpen}>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M18 6L6 18M6 6l12 12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
        </template>
        <template lwc:else>
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
                <path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="rgba(255,255,255,0.15)"/>
            </svg>
        </template>
    </div>

    <!-- Chat Panel -->
    <template lwc:if={isChatOpen}>
        <div class="chat-panel">
            <!-- Header -->
            <div class="chat-header">
                <div class="chat-header-info">
                    <div class="chat-avatar">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                            <path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div>
                        <h3 class="chat-header-title">Sales AI Assistant</h3>
                        <p class="chat-header-status">
                            <span class="status-dot"></span> Online - Powered by Gemini
                        </p>
                    </div>
                </div>
                <button class="chat-close-btn" onclick={toggleChat} title="Close">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <path d="M18 6L6 18M6 6l12 12" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>

            <!-- Messages Area -->
            <div class="chat-messages" lwc:ref="messageContainer">
                <!-- Welcome Message -->
                <template lwc:if={showWelcome}>
                    <div class="welcome-container">
                        <div class="welcome-icon-wrap">
                            <div class="welcome-icon">
                                <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                                    <path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" stroke="#0ea5e9" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </div>
                        </div>
                        <p class="welcome-title">Sales Forecaster AI</p>
                        <p class="welcome-text">I can analyze your pipeline, predict future leads and bookings, and provide data-driven insights from your dashboard.</p>

                        <!-- Quick Suggestion Chips -->
                        <div class="suggestion-chips">
                            <button class="chip" onclick={handleChipClick} data-text="How many total leads do we have?">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" class="chip-icon">
                                    <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2" stroke="currentColor" stroke-width="2"/>
                                    <circle cx="8.5" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
                                    <path d="M20 8v6M23 11h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                </svg>
                                Total Leads
                            </button>
                            <button class="chip" onclick={handleChipClick} data-text="What is our pipeline health and conversion rate?">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" class="chip-icon">
                                    <path d="M22 12h-4l-3 9L9 3l-3 9H2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                                Pipeline Health
                            </button>
                            <button class="chip" onclick={handleChipClick} data-text="Predict next month's leads and bookings">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" class="chip-icon">
                                    <path d="M23 6l-9.5 9.5-5-5L1 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M17 6h6v6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                                Forecast
                            </button>
                            <button class="chip" onclick={handleChipClick} data-text="Which lead sources are performing best?">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" class="chip-icon">
                                    <path d="M12 20V10M18 20V4M6 20v-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                                Top Sources
                            </button>
                        </div>
                    </div>
                </template>

                <!-- Message Bubbles -->
                <template for:each={messages} for:item="msg">
                    <div key={msg.id} class={msg.containerClass}>
                        <template lwc:if={msg.isAi}>
                            <div class="msg-ai-avatar">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                                    <path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </div>
                        </template>
                        <div class={msg.bubbleClass}>
                            <template lwc:if={msg.isAi}>
                                <lightning-formatted-rich-text value={msg.formattedHtml} class="msg-text-rich"></lightning-formatted-rich-text>
                            </template>
                            <template lwc:else>
                                <p class="msg-text">{msg.text}</p>
                            </template>
                            <span class="msg-time">{msg.timestamp}</span>
                        </div>
                    </div>
                </template>

                <!-- Typing Indicator -->
                <template lwc:if={isTyping}>
                    <div class="msg-container msg-container--ai">
                        <div class="msg-ai-avatar">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                                <path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </div>
                        <div class="typing-indicator">
                            <span class="typing-dot"></span>
                            <span class="typing-dot"></span>
                            <span class="typing-dot"></span>
                        </div>
                    </div>
                </template>
            </div>

            <!-- Input Area -->
            <div class="chat-input-area">
                <div class="chat-input-wrapper">
                    <input
                        type="text"
                        class="chat-input"
                        placeholder="Ask about leads, forecasts, pipeline..."
                        value={userInput}
                        onchange={handleInputChange}
                        onkeypress={handleKeyPress}
                        disabled={isTyping}
                        lwc:ref="chatInput"
                    />
                    <button class={sendBtnClass} onclick={handleSendMessage} disabled={isSendDisabled} title="Send">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                            <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
                <p class="chat-disclaimer">AI responses based on your dashboard data. No personal data is shared.</p>
            </div>
        </div>
    </template>
</template>
