<template>
    <!-- Loading Spinner -->
    <template if:true={isLoading}>
        <div class="slds-p-around_medium slds-text-align_center">
            <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
        </div>
    </template>

    <template if:false={isLoading}>
        <div class="slds-p-around_medium">
            <!-- Already Active Warning -->
            <template if:true={isActive}>
                <div class="slds-notify slds-notify_alert slds-alert_warning slds-m-bottom_medium" role="alert">
                    <span class="slds-text-body_regular">
                        This lead is already active. Only inactive leads can be re-opened.
                    </span>
                </div>
                <div class="footer-actions">
                    <lightning-button label="Close" onclick={handleClose}></lightning-button>
                </div>
            </template>

            <!-- Reopen Form -->
            <template if:false={isActive}>
                <div class="lead-name">{leadName}</div>
                <div class="slds-text-body_small slds-m-bottom_medium slds-text-color_weak">
                    Status: {leadStatus} &bull; Project: {projectName}
                </div>

                <div class="slds-box slds-m-bottom_medium slds-theme_shade">
                    <p class="slds-text-body_regular">
                        Re-open this lead? It will be assigned to a new executive via Round Robin
                        and its status will be reset.
                    </p>
                </div>

                <!-- Source (optional) -->
                <div class="form-field">
                    <lightning-input
                        type="text"
                        name="source"
                        label="Source"
                        value={source}
                        onchange={handleSourceChange}
                        placeholder="e.g. Manual, Phone Call">
                    </lightning-input>
                </div>

                <!-- Sub-Source (optional) -->
                <div class="form-field">
                    <lightning-input
                        type="text"
                        name="subSource"
                        label="Sub-Source"
                        value={subSource}
                        onchange={handleSubSourceChange}
                        placeholder="Optional">
                    </lightning-input>
                </div>

                <!-- Footer Actions -->
                <div class="footer-actions">
                    <lightning-button
                        label="Cancel"
                        onclick={handleClose}>
                    </lightning-button>
                    <lightning-button
                        label="Re-open Lead"
                        variant="brand"
                        onclick={handleReopen}
                        disabled={isSubmitting}>
                    </lightning-button>
                </div>
            </template>
        </div>
    </template>

    <!-- Submitting overlay -->
    <template if:true={isSubmitting}>
        <lightning-spinner alternative-text="Re-opening..." size="medium"></lightning-spinner>
    </template>
</template>
